name: Backup Supabase (BD + Storage)

# El cron solo se activa cuando este archivo está en la rama por defecto (main).
# El trigger manual (workflow_dispatch) funciona desde cualquier rama.
on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 02:00 Ecuador, diario
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar pg_dump (PostgreSQL 17 client)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Instalar rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Respaldar base de datos (pg_dump, formato comprimido)
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          FECHA=$(date +%Y-%m-%d)
          echo "FECHA=$FECHA" >> "$GITHUB_ENV"
          pg_dump "$DATABASE_URL" --format=custom --file="db_${FECHA}.dump"

      - name: Subir dump diario a Backblaze B2
        env:
          RCLONE_CONFIG_B2REMOTE_TYPE: b2
          RCLONE_CONFIG_B2REMOTE_ACCOUNT: ${{ secrets.B2_KEY_ID }}
          RCLONE_CONFIG_B2REMOTE_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          rclone copy "db_${FECHA}.dump" "b2remote:${{ secrets.B2_BUCKET }}/daily/"

      - name: Copiar a respaldo mensual si es día 1
        env:
          RCLONE_CONFIG_B2REMOTE_TYPE: b2
          RCLONE_CONFIG_B2REMOTE_ACCOUNT: ${{ secrets.B2_KEY_ID }}
          RCLONE_CONFIG_B2REMOTE_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          if [ "$(date +%d)" = "01" ]; then
            MES=$(date +%Y-%m)
            rclone copyto "db_${FECHA}.dump" "b2remote:${{ secrets.B2_BUCKET }}/monthly/db_${MES}.dump"
          fi

      - name: Borrar dumps diarios con más de 30 días (rotación)
        env:
          RCLONE_CONFIG_B2REMOTE_TYPE: b2
          RCLONE_CONFIG_B2REMOTE_ACCOUNT: ${{ secrets.B2_KEY_ID }}
          RCLONE_CONFIG_B2REMOTE_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          rclone delete --min-age 30d "b2remote:${{ secrets.B2_BUCKET }}/daily/"

      - name: Respaldar Supabase Storage (bucket documentos-pacientes)
        env:
          RCLONE_CONFIG_B2REMOTE_TYPE: b2
          RCLONE_CONFIG_B2REMOTE_ACCOUNT: ${{ secrets.B2_KEY_ID }}
          RCLONE_CONFIG_B2REMOTE_KEY: ${{ secrets.B2_APP_KEY }}
          RCLONE_CONFIG_SUPABASE_TYPE: s3
          RCLONE_CONFIG_SUPABASE_PROVIDER: Other
          RCLONE_CONFIG_SUPABASE_ACCESS_KEY_ID: ${{ secrets.SUPABASE_STORAGE_ACCESS_KEY }}
          RCLONE_CONFIG_SUPABASE_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_STORAGE_SECRET_KEY }}
          RCLONE_CONFIG_SUPABASE_ENDPOINT: ${{ secrets.SUPABASE_STORAGE_ENDPOINT }}
        run: |
          rclone copy "supabase:documentos-pacientes" "b2remote:${{ secrets.B2_BUCKET }}/storage/documentos-pacientes" --fast-list
